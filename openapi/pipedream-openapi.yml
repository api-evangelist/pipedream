      required:
      - id
      - created_at
      - updated_at
      - custom_response
      - endpoint_url
      - key
      - type
      properties:
        id:
          type: string
          description: The unique ID of the HTTP interface
          pattern: ^hi_[a-zA-Z0-9]+$
        key:
          type: string
        endpoint_url:
          type: string
        custom_response:
          type: boolean
        created_at:
          type: integer
          description: The timestamp when the HTTP interface was created (epoch milliseconds)
        updated_at:
          type: integer
          description: The timestamp when the HTTP interface was last updated (epoch milliseconds)
        type:
          type: string
          description: The discriminator field
          enum:
          - HttpInterface
    ListAccountsResponse:
      type: object
      description: Response received when listing accounts
      required:
      - data
      - page_info
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        page_info:
          $ref: '#/components/schemas/PageInfo'
    Project:
