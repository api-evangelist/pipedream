    ListProjectsResponse:
      type: object
      description: Response received when listing Connect projects
      required:
      - data
      - page_info
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        page_info:
          $ref: '#/components/schemas/PageInfo'
    ListAppsResponse:
      type: object
