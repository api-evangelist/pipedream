          $ref: '#/components/schemas/PageInfo'
    GetAccountsResponse:
      type: object
      description: Response received when retrieving a list of accounts
      required:
      - data
      - page_info
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        page_info:
          $ref: '#/components/schemas/PageInfo'
    GetAppResponse:
      type: object
      description: Response received when retrieving a single app
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/App'
    GetAppCategoryResponse:
      $ref: '#/components/schemas/AppCategory'
    GetAppsResponse:
      type: object
      description: Response received when retrieving a list of apps
      required:
      - data
      - page_info
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/App'
        page_info:
          $ref: '#/components/schemas/PageInfo'
    GetComponentResponse:
      type: object
      description: Response received when retrieving a specific component
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/Component'
    GetComponentsResponse:
      type: object
      description: Response received when retrieving a list of components
      required:
      - data
      - page_info
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Component'
        page_info:
          $ref: '#/components/schemas/PageInfo'
    GetTriggerEventsResponse:
      type: object
      description: Response received when retrieving trigger events
      required:
      - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EmittedEvent'
    GetTriggerResponse:
      type: object
      description: Response received when retrieving a deployed trigger
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/Emitter'
    GetTriggerWebhooksResponse:
      type: object
