          items:
            $ref: '#/components/schemas/TriggerWebhook'
    GetTriggerWorkflowsResponse:
      type: object
      description: Response received when retrieving trigger workflows
      required:
      - workflow_ids
      properties:
        workflow_ids:
          type: array
          items:
            type: string
            pattern: ^p_[a-zA-Z0-9]+
    GetTriggersResponse:
      type: object
      description: Response received when listing deployed triggers
      required:
      - data
      - page_info
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Emitter'
        page_info:
          $ref: '#/components/schemas/PageInfo'
    HttpInterface:
      type: object
