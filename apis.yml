- aid: pipedream:mcp-server
  name: Pipedream MCP Server
  description: Pipedream's hosted Model Context Protocol server at remote.mcp.pipedream.net
    exposes 10,000+ tools across 2,800+ integrated apps to AI agents over JSON-RPC.
    The server supports both SSE and streamable HTTP transports dynamically based
    on the Accept header, with no client-side configuration required. Authentication
    is OAuth 2.0 Bearer; per-session context (project, environment, external user,
    app slug) is supplied via x-pd-* headers. Native integrations exist for OpenAI
    Responses API, Anthropic Claude, Google Gemini, and Vercel AI SDK.
  humanURL: https://pipedream.com/docs/connect/mcp/developers
  baseURL: https://remote.mcp.pipedream.net/v3
  tags:
  - MCP
  - AI Agents
  - Tool Calling
  - JSON-RPC
