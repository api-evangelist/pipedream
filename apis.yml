- aid: pipedream:connect
  name: Pipedream Connect
  description: Pipedream Connect is the end-to-end developer toolkit for embedding
    customer-facing integrations and AI-agent capabilities into applications. It provides
    managed OAuth for 3,000+ APIs, pre-built components (actions and triggers), a
    Connect Proxy that signs custom HTTP requests on behalf of end-users, a File Stash
    for working with user file uploads, deployed-trigger webhooks, usage metering,
    and project-scoped resources with development and production environments. Endpoints
    live under /v1/connect/* on api.pipedream.com.
  humanURL: https://pipedream.com/docs/connect
  baseURL: https://api.pipedream.com/v1/connect
  tags:
  - Connect
  - Embedded Integrations
  - Managed Auth
  - AI Agents
  - Proxy
  - Webhooks
