aid: pipedream
name: Pipedream
segments:
- ProCode_API_Composition
- Workflows
- Connect
- MCP
description: 'Pipedream is a developer-centric integration platform providing three
  product lines: Workflows (code-level event-driven automation in Node.js/Python/Go/Bash),
  Connect (an embedded integration toolkit for adding customer-facing integrations
  and AI agents to applications, with managed OAuth for 3,000+ APIs), and a hosted
  MCP server exposing 10,000+ tools over JSON-RPC for AI agents. Pipedream announced
  an acquisition agreement with Workday on 2025-11-19.'
