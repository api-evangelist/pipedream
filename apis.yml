apis:
  - aid: pipedream:rest-api
    name: Pipedream REST API
    description: The Pipedream REST API allows developers to programmatically create and manage workflows,
      event sources, subscriptions, and user resources. The API supports Bearer token authentication via
      OAuth access tokens or user API keys, pagination with cursors, and filtering with include and exclude
      parameters.
    humanURL: https://pipedream.com/docs/rest-api/
    baseURL: https://api.pipedream.com/v1
    tags:
      - Automation
      - Event Sources
      - Subscriptions
      - Workflows
    properties:
      - type: Documentation
        url: https://pipedream.com/docs/rest-api/
      - type: Authentication
        url: https://pipedream.com/docs/rest-api/auth
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/pipedream/refs/heads/master/openapi/pipedream-openapi.yml
  - aid: pipedream:connect-api
    name: Pipedream Connect API
    description: The Pipedream Connect API is the end-to-end developer toolkit for adding customer-facing
      integrations to applications and AI agents. It provides managed authentication for 3,000+ APIs,
      pre-built components and triggers, a Connect proxy for custom API requests, and usage tracking.
      Resources are scoped to projects and the API supports production and development environments.
    humanURL: https://pipedream.com/docs/connect
    baseURL: https://api.pipedream.com/v1/connect
    tags:
      - AI Agents
      - Connect
      - Integrations
      - Managed Auth
    properties:
      - type: Documentation
        url: https://pipedream.com/docs/connect/api-ref
      - type: GettingStarted
