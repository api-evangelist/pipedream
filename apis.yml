- aid: pipedream:rest-api
  name: Pipedream REST API
  description: The Pipedream REST API at api.pipedream.com is the unified surface
    for both the legacy workflow / source / subscription resources and the newer /v1/connect/*
    resources. Authentication is via OAuth 2.0 client credentials or a short-lived
    Connect token. List endpoints use cursor pagination (limit, after, before). The
    full OpenAPI 3.0.4 spec is published at pipedream.com/docs/pipedream_openapi_swagger.json
    (133 schemas, 61 operations as of 2026-05-22).
