aid: pipedream
name: Pipedream
segments:
  - ProCode_API_Composition
  - Workflows
description: >-
  Pipedream is a developer-centric integration platform allowing custom code and
  API connections embedded directly into production workflows. Trusted by over
  one million developers, Pipedream provides 3,000+ integrations, pre-built
  actions, and support for Node.js, Python, Golang, and Bash, enabling teams to
  connect APIs, AI, databases, and more.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ProCode_API_Composition
  - Workflows
created: '2026-03-03'
modified: '2026-03-03'
url: https://raw.githubusercontent.com/api-evangelist/pipedream/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: pipedream:rest-api
    name: Pipedream REST API
    description: >-
      The Pipedream REST API allows developers to programmatically create and
      manage workflows, event sources, subscriptions, and user resources. The
      API supports Bearer token authentication via OAuth access tokens or user
      API keys, pagination with cursors, and filtering with include and exclude
      parameters.
    humanURL: https://pipedream.com/docs/rest-api/
    baseURL: https://api.pipedream.com/v1
    tags:
      - Workflows
      - Event Sources
      - Subscriptions
      - Automation
    properties:
      - type: Documentation
        url: https://pipedream.com/docs/rest-api/
      - type: Authentication
        url: https://pipedream.com/docs/rest-api/auth
  - aid: pipedream:connect-api
    name: Pipedream Connect API
    description: >-
      The Pipedream Connect API is the end-to-end developer toolkit for adding
      customer-facing integrations to applications and AI agents. It provides
      managed authentication for 3,000+ APIs, pre-built components and triggers,
      a Connect proxy for custom API requests, and usage tracking. Resources are
      scoped to projects and the API supports production and development
      environments.
    humanURL: https://pipedream.com/docs/connect
    baseURL: https://api.pipedream.com/v1/connect
    tags:
      - Integrations
      - Connect
      - Managed Auth
      - AI Agents
    properties:
      - type: Documentation
        url: https://pipedream.com/docs/connect/api-ref
      - type: GettingStarted
        url: https://pipedream.com/docs/connect/quickstart
      - type: SDKs
        url: https://pipedream.com/docs/connect/api-reference/sdks
