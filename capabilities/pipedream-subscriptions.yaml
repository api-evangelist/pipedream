naftiko: 1.0.0-alpha2
info:
  label: Pipedream REST API — Subscriptions
  description: 'Pipedream REST API — Subscriptions. 3 operations. Lead operation: List subscriptions. Self-contained Naftiko
    capability covering one Pipedream business surface.'
  tags:
  - Pipedream
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDREAM_API_KEY: PIPEDREAM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pipedream-subscriptions
    baseUri: https://api.pipedream.com/v1
    description: Pipedream REST API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: subscriptions
      path: /subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: List subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsubscription
        method: POST
        description: Create a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: subscriptions-id
      path: /subscriptions/{id}
      operations:
      - name: deletesubscription
        method: DELETE
        description: Delete a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.PIPEDREAM_API_KEY}}'
  exposes:
  - type: rest
    namespace: pipedream-subscriptions-rest
    port: 8080
    description: REST adapter for Pipedream REST API — Subscriptions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/subscriptions
      name: subscriptions
      description: REST surface for subscriptions.
      operations:
      - method: GET
        name: listsubscriptions
        description: List subscriptions
        call: pipedream-subscriptions.listsubscriptions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsubscription
        description: Create a subscription
        call: pipedream-subscriptions.createsubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/{id}
      name: subscriptions-id
      description: REST surface for subscriptions-id.
      operations:
      - method: DELETE
        name: deletesubscription
        description: Delete a subscription
        call: pipedream-subscriptions.deletesubscription
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pipedream-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedream REST API — Subscriptions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-subscriptions
      description: List subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipedream-subscriptions.listsubscriptions
      outputParameters:
      - type: object
        mapping: $.
    - name: create-subscription
      description: Create a subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pipedream-subscriptions.createsubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-subscription
      description: Delete a subscription
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: pipedream-subscriptions.deletesubscription
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
