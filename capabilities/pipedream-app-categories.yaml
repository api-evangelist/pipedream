naftiko: 1.0.0-alpha2
info:
  label: Pipedream API - App Categories
  description: Pipedream API - App Categories. 2 operations. Self-contained Naftiko capability covering one Pipedream business surface.
  tags:
  - Pipedream
  - App Categories
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    PIPEDREAM_ACCESS_TOKEN: PIPEDREAM_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: pipedream-app-categories
    baseUri: https://api.pipedream.com
    description: Pipedream API - App Categories business capability. Self-contained, no shared references.
    resources:
    - name: v1-connect-app-categories
      path: /v1/connect/app_categories
      operations:
      - name: listappcategories
        method: GET
        description: List App Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-connect-app-categories-id
      path: /v1/connect/app_categories/{id}
      operations:
      - name: retrieveappcategory
        method: GET
        description: Retrieve App Category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.PIPEDREAM_ACCESS_TOKEN}}'
  exposes:
  - type: rest
    namespace: pipedream-app-categories-rest
    port: 8080
    description: REST adapter for Pipedream API - App Categories. One resource per consumed operation.
    resources:
    - path: /v1/connect/app_categories
      name: v1-connect-app-categories
      description: REST surface for v1-connect-app-categories.
      operations:
      - method: GET
        name: listappcategories
        description: List App Categories
        call: pipedream-app-categories.listappcategories
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connect/app_categories/{id}
      name: v1-connect-app-categories-id
      description: REST surface for v1-connect-app-categories-id.
      operations:
      - method: GET
        name: retrieveappcategory
        description: Retrieve App Category
        call: pipedream-app-categories.retrieveappcategory
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pipedream-app-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedream API - App Categories. One tool per consumed operation.
    tools:
    - name: listappcategories
      description: List App Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipedream-app-categories.listappcategories
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieveappcategory
      description: Retrieve App Category
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipedream-app-categories.retrieveappcategory
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
