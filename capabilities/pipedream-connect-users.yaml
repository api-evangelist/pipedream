  - type: http
    namespace: pipedream-connect-users
    baseUri: https://api.pipedream.com
    description: Pipedream API - Users business capability. Self-contained, no shared references.
    resources:
    - name: v1-connect-project-id-users
      path: /v1/connect/{project_id}/users
      operations:
      - name: listusers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: x-pd-environment
          in: header
          type: string
          required: true
        - name: after
          in: query
          type: string
          required: false
        - name: before
          in: query
          type: string
          required: false
        - name: limit
          in: query
          type: integer
          required: false
        - name: q
          in: query
          type: string
          required: false
