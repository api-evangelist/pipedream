    namespace: pipedream-connect-users-rest
    port: 8080
    description: REST adapter for Pipedream API - Users. One resource per consumed operation.
    resources:
    - path: /v1/connect/{project_id}/users
      name: v1-connect-project-id-users
      description: REST surface for v1-connect-project-id-users.
      operations:
      - method: GET
        name: listusers
        description: List Users
        call: pipedream-connect-users.listusers
        with:
          x-pd-environment: rest.x-pd-environment
          after: rest.after
          before: rest.before
          limit: rest.limit
          q: rest.q
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pipedream-connect-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedream API - Users. One tool per consumed operation.
    tools:
    - name: listusers
      description: List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipedream-connect-users.listusers
      with:
        x-pd-environment: tools.x-pd-environment
        after: tools.after
        before: tools.before
        limit: tools.limit
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
