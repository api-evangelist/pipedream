  - Pipedream
  - Users
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    PIPEDREAM_ACCESS_TOKEN: PIPEDREAM_ACCESS_TOKEN
capability:
