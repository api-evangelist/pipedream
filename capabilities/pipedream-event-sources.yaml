naftiko: 1.0.0-alpha2
info:
  label: Pipedream REST API — Event Sources
  description: 'Pipedream REST API — Event Sources. 4 operations. Lead operation: Get an event source. Self-contained Naftiko
    capability covering one Pipedream business surface.'
  tags:
  - Pipedream
  - Event Sources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PIPEDREAM_API_KEY: PIPEDREAM_API_KEY
capability:
  consumes:
  - type: http
    namespace: pipedream-event-sources
    baseUri: https://api.pipedream.com/v1
    description: Pipedream REST API — Event Sources business capability. Self-contained, no shared references.
    resources:
    - name: sources-id
      path: /sources/{id}
      operations:
      - name: getsource
        method: GET
        description: Get an event source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: deletesource
        method: DELETE
        description: Delete an event source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: users-me-sources
      path: /users/me/sources
      operations:
      - name: listsources
        method: GET
        description: List event sources for the authenticated user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsource
        method: POST
        description: Create an event source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PIPEDREAM_API_KEY}}'
  exposes:
  - type: rest
    namespace: pipedream-event-sources-rest
    port: 8080
    description: REST adapter for Pipedream REST API — Event Sources. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sources/{id}
      name: sources-id
      description: REST surface for sources-id.
      operations:
      - method: GET
        name: getsource
        description: Get an event source
        call: pipedream-event-sources.getsource
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesource
        description: Delete an event source
        call: pipedream-event-sources.deletesource
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/me/sources
      name: users-me-sources
      description: REST surface for users-me-sources.
      operations:
      - method: GET
        name: listsources
        description: List event sources for the authenticated user
        call: pipedream-event-sources.listsources
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsource
        description: Create an event source
        call: pipedream-event-sources.createsource
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pipedream-event-sources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pipedream REST API — Event Sources. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-event-source
      description: Get an event source
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipedream-event-sources.getsource
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-event-source
      description: Delete an event source
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: pipedream-event-sources.deletesource
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-event-sources-authenticated-user
      description: List event sources for the authenticated user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipedream-event-sources.listsources
      outputParameters:
      - type: object
        mapping: $.
    - name: create-event-source
      description: Create an event source
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pipedream-event-sources.createsource
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
